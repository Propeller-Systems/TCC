<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Importa os estilos CSS externos -->    
    <link href="style.css" rel="stylesheet">
</head>
<body class="login">
    <form class="form" action="/" method="POST">
        <div class="container-login">
            <div class="login-box">
                <h1 class="login-title">Bem-vindo</h1>
                <div class="input-group a">
                    <label for="usuario">Usuário</label>
                    <input type="text" id="idLogin" name="idLogin" placeholder="Digite seu ID" required>
                </div>
                
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="Senha" name="Senha" placeholder="********" required>
                </div>
                
                <input onclick="logar()" class="login-btn" id="btn-entrar" value="Entrar">
                
                <div class="links">
                    <a  href="#">Esqueceu a senha?</a>
                </div>
                <img src="image/powewdbypropeller.png" class="logo-login">
                
            </div>
        </div>
    </form>

    <!-- Importa o arquivo JavaScript externo -->
    <script type="text/JavaScript" src="script.js"></script>
</body>
<script src="script.js"></script>
</html>
