<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão</title>
    <link href="style.css" rel="stylesheet">
</head>
<body class="gestao">

    <div id="sidebar-placeholder"></div>

    <main>
        <div class="p-4">
            <div>
                <h2 class="mb-4">Organizar Documentos</h2>
                Aqui você pode visualizar os documentos que você enviou ou que foram enviados a você
            </div>
            <hr>
            <div>
            </div>
            <div class="container-doc">
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider">
                        <span id="doc-active">Documentos</span>
                        <span id="atest-active">Atestados</span>
                    </span>
                </label>
                <div>
                    <hr>
                <form class="container-src" action="/pesquisa" method="get">
                    <input class="search" type="search" name="search" placeholder="Faça sua busca">
                    <button type="submit">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/></svg>
                    </button>
                </form>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js" defer></script>
</body>
</html>
