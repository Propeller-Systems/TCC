<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão</title>
    <link href="style.css" rel="stylesheet">
</head>
<body class="gestao">

    <div id="sidebar-placeholder"></div>

    <main>
        <div class="p-4">
            <div>
            <h2 class="ms-4">Visão Geral</h2>
            <p class="ms-2">Bem-vindo de volta! Aqui está o resumo de sua equipe hoje.</p>
            </div>
            <div class="dashboard">
                <div class="dash">
                    <img src="icons/totalf.png" class="dash-icon" alt="">       
                    <span class="label">Total de Funcionários</span>
                    <span class="fs-1">101</span>
                    <span class="text-success">+20% esse mês*</span>
                </div>
                <div class="dash">
                    <img src="icons/activef.png" class="dash-icon" alt="">                    
                    <span class="label">Funcionários Ativos</span>
                    <span class="fs-1">22</span>
                    <span class="text-success">+5% esse mês*</span>
                </div>
                <div class="dash">
                    <img src="icons/licensaf.png" class="dash-icon" alt="">
                    <span class="label">Em licensa/férias</span>
                    <span class="fs-1">5</span>
                    <span class="text-secondary">3 voltam semana que vem*</span>
                </div>
                <div class="dash">
                    <img src="icons/contratf.png" class="dash-icon" alt="">
                    <span class="label">Novas Contratações</span>
                    <span class="fs-1">2</span>
                    <span class="text-success">Nas últimas semanas*</span>
                </div>  
            </div>
        </div>
    </main>
    <script src="script.js" defer></script>
</body>
</html>
