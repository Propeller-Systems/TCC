<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novo Funcionário</title>
    <link href="style.css" rel="stylesheet" />
</head>

<body>
    <div id="sidebar-placeholder"></div>

    <main id="main-content">
        <div class="container usuario">
            <h1>Adicione as credenciais necessarias</h1>
            <div>
                <!--Input do nome-->
                <label>Nome:</label>
                <input type="text" id="nome-user" placeholder="Escreva o nome completo" required
                    class="border p-2 form-control">
            </div>

            <!--Input do email-->
            <div>
                <label class=>E-mail:</label>
                <input type="text" id="nome-email" placeholder="Escreva o E-mail" required
                    class="border p-2 form-control">
            </div>

            <!--Input foto-->
            <div>
                <label>Foto:</label><br>
                <button type="button" id="btnFoto" class="btn btn-dark btnFoto" onclick="abrirModalFoto()">+ Adicionar Foto</button>
            </div>
            <!--Input escopo-->
            <div>
                <label class=>Escopo:</label>
                <select class="form-select form-select-sm" aria-label=".form-select-sm example">
                    <option value="funcionario" selected>Funcionário</option>
                    <option value="admin">Gestor</option>
                </select>
            </div>
        </div>
    </main>



    <script src="script.js" defer></script>
</body>

</html>
